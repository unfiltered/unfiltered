name: ci
on:
  push:
  pull_request:
jobs:
  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 17
            os: ubuntu-latest
          - java: 11
            os: ubuntu-latest
          - java: 11
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/setup-java@v5
      with:
        java-version: ${{matrix.java}}
        distribution: adopt
    - uses: actions/checkout@v6
    - uses: sbt/setup-sbt@6bec67c98f542b9e17369bfca0ec822ac1363194 # v1.1.19
    - shell: bash
      run: sbt -v "+ mimaReportBinaryIssues" "+ test" "+ publishLocal"
    - shell: bash
      run: rm -rf "$HOME/.ivy2/local" || true
