name: scala-steward
on:
  push:
    branches: [ main ]
  schedule:
  - cron: '0 16 * * *'
  workflow_dispatch:
concurrency:
  group: scala-steward
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'unfiltered' }}
    timeout-minutes: 30
    steps:
    - name: generate token
      id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89698
        private-key: ${{ secrets.UNFILTERED_APP_KEY }}
    - name: scala-steward
      uses: scala-steward-org/scala-steward-action@v2
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        author-email: "74865306+unfiltered-app[bot]@users.noreply.github.com"
        author-name: "unfiltered-app[bot]"
        branches: "main,0.12.x,0.11.x,0.10.x"
